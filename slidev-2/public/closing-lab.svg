<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3fb950" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#13141c"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="1200" y2="100" stroke="#1a1b2e" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#1a1b2e" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="300" x2="1200" y2="300" stroke="#1a1b2e" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="400" x2="1200" y2="400" stroke="#1a1b2e" stroke-width="1" opacity="0.2"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#1a1b2e" stroke-width="1" opacity="0.3"/>

  <!-- Stars -->
  <circle cx="80" cy="50" r="1.5" fill="#565f89" opacity="0.4"/>
  <circle cx="350" cy="30" r="1" fill="#565f89" opacity="0.3"/>
  <circle cx="900" cy="45" r="1.5" fill="#565f89" opacity="0.5"/>
  <circle cx="1100" cy="25" r="1" fill="#565f89" opacity="0.3"/>

  <!-- Header glow bar -->
  <rect x="0" y="48" width="1200" height="2" fill="url(#headerGrad)"/>

  <!-- lab.pollack.ai -->
  <text x="600" y="45" text-anchor="middle" font-family="monospace" font-size="14" fill="#565f89" letter-spacing="4">lab.pollack.ai</text>

  <!-- Main title -->
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a9b1d6" font-weight="bold">AgentWorks</text>
  <text x="600" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#565f89">Tools for building, evaluating, and observing AI agents on the JVM</text>

  <!-- Divider -->
  <line x1="400" y1="150" x2="800" y2="150" stroke="#2a2b3d" stroke-width="1"/>

  <!-- Left column: Core Libraries -->
  <text x="180" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#7dcfff" font-weight="bold" letter-spacing="1">CORE LIBRARIES</text>

  <!-- Agent Client -->
  <g transform="translate(60, 210)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#3fb950" opacity="0.6"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Client</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Autonomous CLI agent integrations</text>
  </g>

  <!-- Agent Judge -->
  <g transform="translate(60, 260)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#3fb950" opacity="0.6"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Judge</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Tiered evaluation with jury system</text>
  </g>

  <!-- Agent Journal -->
  <g transform="translate(60, 310)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#3fb950" opacity="0.6"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Journal</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Behavioral trace capture</text>
  </g>

  <!-- Agent Experiment -->
  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#3fb950" opacity="0.6"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Experiment</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">End-to-end experiment driver</text>
  </g>

  <!-- Agent Workflow -->
  <g transform="translate(60, 410)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#3fb950" opacity="0.6"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Workflow</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Multi-step agentic pipelines</text>
  </g>

  <!-- Agent Skills -->
  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#3fb950" opacity="0.6"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Skills</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Domain knowledge modules</text>
  </g>

  <!-- Center column: Experiments -->
  <text x="600" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#7dcfff" font-weight="bold" letter-spacing="1">EXPERIMENTS</text>

  <!-- v1 -->
  <g transform="translate(420, 210)">
    <rect x="0" y="0" width="360" height="52" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <rect x="12" y="12" width="60" height="20" rx="4" fill="#2a2b3d"/>
    <text x="42" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#565f89">v1</text>
    <text x="84" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#a9b1d6" font-weight="bold">Code Coverage Baseline</text>
    <text x="84" y="38" font-family="monospace" font-size="9" fill="#565f89">9 variants, two independent axes discovered</text>
  </g>

  <!-- v2 -->
  <g transform="translate(420, 272)">
    <rect x="0" y="0" width="360" height="52" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <rect x="12" y="12" width="60" height="20" rx="4" fill="#2a2b3d"/>
    <text x="42" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#565f89">v2</text>
    <text x="84" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#a9b1d6" font-weight="bold">I Read My Agent's Diary</text>
    <text x="84" y="38" font-family="monospace" font-size="9" fill="#565f89">Skills vs knowledge bases, 7 variants, Markov analysis</text>
  </g>

  <!-- v3 (highlighted as current) -->
  <g transform="translate(420, 334)">
    <rect x="0" y="0" width="360" height="52" rx="6" fill="#1a2e1a" stroke="#3fb950" stroke-width="1.5" filter="url(#glow)"/>
    <rect x="12" y="12" width="60" height="20" rx="4" fill="#0d2010"/>
    <text x="42" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#3fb950" font-weight="bold">v3</text>
    <text x="84" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#3fb950" font-weight="bold">Fork in the Code</text>
    <text x="84" y="38" font-family="monospace" font-size="9" fill="#7dff9a">Exemplar effect — code overrides skills</text>
    <text x="348" y="26" text-anchor="end" font-family="monospace" font-size="9" fill="#3fb950">NEW</text>
  </g>

  <!-- v4 (upcoming) -->
  <g transform="translate(420, 396)">
    <rect x="0" y="0" width="360" height="52" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1" stroke-dasharray="4 4"/>
    <rect x="12" y="12" width="60" height="20" rx="4" fill="#2a2b3d"/>
    <text x="42" y="26" text-anchor="middle" font-family="monospace" font-size="10" fill="#565f89">v4</text>
    <text x="84" y="22" font-family="system-ui, sans-serif" font-size="12" fill="#565f89">Fix the Exemplar</text>
    <text x="84" y="38" font-family="monospace" font-size="9" fill="#3a3b4d">Separate upgrade step before test generation</text>
    <text x="348" y="26" text-anchor="end" font-family="monospace" font-size="9" fill="#565f89">NEXT</text>
  </g>

  <!-- Right column: More libraries -->
  <text x="1020" y="190" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#7dcfff" font-weight="bold" letter-spacing="1">ALSO ON MAVEN CENTRAL</text>

  <!-- Agent Memory -->
  <g transform="translate(900, 210)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#58a6ff" opacity="0.5"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Memory</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Progressive context compaction</text>
  </g>

  <!-- Agent Hooks -->
  <g transform="translate(900, 260)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#58a6ff" opacity="0.5"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Hooks</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Tool-call boundary steering</text>
  </g>

  <!-- Agent Sandbox -->
  <g transform="translate(900, 310)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#58a6ff" opacity="0.5"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Sandbox</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Isolated command execution</text>
  </g>

  <!-- Agent Tools -->
  <g transform="translate(900, 360)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#58a6ff" opacity="0.5"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Agent Tools</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">File, shell, search, web, subagent</text>
  </g>

  <!-- Claude Agent SDK -->
  <g transform="translate(900, 410)">
    <rect x="0" y="0" width="240" height="42" rx="6" fill="#1a1b2e" stroke="#2a2b3d" stroke-width="1"/>
    <circle cx="20" cy="21" r="6" fill="#58a6ff" opacity="0.5"/>
    <text x="36" y="17" font-family="monospace" font-size="12" fill="#a9b1d6" font-weight="bold">Claude Agent SDK</text>
    <text x="36" y="32" font-family="monospace" font-size="9" fill="#565f89">Java SDK for Claude Code CLI</text>
  </g>

  <!-- Bottom divider -->
  <line x1="100" y1="530" x2="1100" y2="530" stroke="#2a2b3d" stroke-width="1"/>

  <!-- Footer -->
  <text x="600" y="560" text-anchor="middle" font-family="monospace" font-size="14" fill="#3fb950" filter="url(#glow)">All libraries available on Maven Central</text>
  <text x="600" y="585" text-anchor="middle" font-family="monospace" font-size="12" fill="#565f89">Spring I/O Barcelona 2026 Workshop</text>
  <text x="600" y="610" text-anchor="middle" font-family="monospace" font-size="16" fill="#a9b1d6" font-weight="bold">lab.pollack.ai</text>

  <!-- Small Agento in corner -->
  <g transform="translate(30, 555) scale(0.22)">
    <rect x="26" y="76" width="108" height="108" rx="32" fill="#e8a820" stroke="#a06800" stroke-width="1.5"/>
    <ellipse cx="80" cy="65" rx="48" ry="52" fill="#e8a820" stroke="#a06800" stroke-width="1.5"/>
    <rect x="42" y="98" width="76" height="54" rx="9" fill="#071510" stroke="#1e3a22" stroke-width="1.5"/>
    <rect x="50" y="106" width="42" height="3" rx="1.5" fill="#3fb950" opacity="0.7"/>
    <rect x="50" y="113" width="56" height="3" rx="1.5" fill="#3fb950" opacity="0.5"/>
    <rect x="50" y="120" width="35" height="3" rx="1.5" fill="#58a6ff" opacity="0.6"/>
    <rect x="28" y="51" width="104" height="26" rx="13" fill="#12121e" opacity="0.9"/>
    <circle cx="55" cy="64" r="10" fill="#080e18"/>
    <circle cx="55" cy="64" r="7" fill="#0d1520"/>
    <circle cx="57" cy="63" r="4" fill="#a9b1d6"/>
    <circle cx="58" cy="62" r="2" fill="#ffffff"/>
    <circle cx="105" cy="64" r="10" fill="#080e18"/>
    <circle cx="105" cy="64" r="7" fill="#0d1520"/>
    <circle cx="107" cy="63" r="4" fill="#a9b1d6"/>
    <circle cx="108" cy="62" r="2" fill="#ffffff"/>
    <rect x="68" y="61" width="24" height="6" rx="3" fill="#12121e"/>
    <line x1="80" y1="13" x2="80" y2="33" stroke="#b07208" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="80" cy="10" r="6" fill="#3fb950" filter="url(#glow)"/>
    <circle cx="80" cy="10" r="3" fill="#7dff9a"/>
  </g>

</svg>
